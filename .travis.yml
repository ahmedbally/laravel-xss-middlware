language: php

dist: jammy

php:
  - 8.1
  - 8.2
  - 8.3
  - 8.4

env:
  - LARAVEL_VERSION=^10.0
  - LARAVEL_VERSION=^11.0
  - LARAVEL_VERSION=^12.0
  - LARAVEL_VERSION=^13.0

jobs:
  exclude:
    - php: 8.1
      env: LARAVEL_VERSION=^11.0
    - php: 8.1
      env: LARAVEL_VERSION=^12.0
    - php: 8.1
      env: LARAVEL_VERSION=^13.0
    - php: 8.4
      env: LARAVEL_VERSION=^10.0

before_script:
  - composer require "illuminate/support:${LARAVEL_VERSION}" "illuminate/http:${LARAVEL_VERSION}" --no-interaction --no-update
  - composer update --prefer-dist --no-interaction --no-progress

script:
  - vendor/bin/phpunit --coverage-text --coverage-clover=coverage.clover
